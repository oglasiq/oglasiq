<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OglasIQ — Prijava</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{--bg:#080810;--surface:#0f0f1a;--border:#1a1a2e;--text:#ffffff;--muted:#6b7280;--accent:#5b6cf9;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
        nav{display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:56px;background:rgba(8,8,16,0.95);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);}
        .logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:600;text-decoration:none;color:#fff;}
        .logo-ring{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;}
        .logo-dot{width:10px;height:10px;border-radius:50%;border:1px solid var(--accent);}
        .nav-right{font-size:13px;color:var(--muted);}
        .nav-right a{color:var(--accent);text-decoration:none;margin-left:6px;}
        .main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px;width:100%;max-width:400px;}
        .card-title{font-size:22px;font-weight:700;letter-spacing:-0.5px;margin-bottom:6px;}
        .card-sub{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.6;}
        .form-group{margin-bottom:16px;}
        .form-label{font-size:12px;font-weight:500;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
        .form-label a{color:var(--accent);text-decoration:none;font-size:12px;}
        .form-input{width:100%;background:var(--bg);border:1px solid var(--border);color:#fff;padding:10px 14px;border-radius:8px;font-size:14px;outline:none;transition:border-color 0.2s;}
        .form-input:focus{border-color:var(--accent);}
        .form-input::placeholder{color:#374151;}
        .password-wrap{position:relative;}
        .password-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;}
        .remember-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
        .remember-check{display:flex;align-items:center;gap:8px;cursor:pointer;}
        .remember-check input{accent-color:var(--accent);cursor:pointer;}
        .remember-check span{font-size:13px;color:var(--muted);}
        .btn-submit{width:100%;background:var(--accent);color:#fff;border:none;padding:12px;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;transition:opacity 0.2s;}
        .btn-submit:hover{opacity:0.85;}
        .btn-submit:disabled{opacity:0.5;cursor:not-allowed;}
        .divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
        .divider-line{flex:1;height:1px;background:var(--border);}
        .divider span{font-size:12px;color:var(--muted);}
        .social-btn{width:100%;background:transparent;border:1px solid var(--border);color:var(--muted);padding:10px;border-radius:10px;font-size:14px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
        .social-btn:hover{border-color:#333;color:#fff;}
        .register-link{text-align:center;font-size:13px;color:var(--muted);margin-top:20px;}
        .register-link a{color:var(--accent);text-decoration:none;}
        .error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;}
        .error-msg.show{display:block;}
        .success-msg{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);color:#86efac;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;}
        .success-msg.show{display:block;}
        .loading-spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;margin-right:8px;vertical-align:middle;}
        @keyframes spin{to{transform:rotate(360deg);}}

        /* RESET GESLA */
        .reset-wrap{display:none;}
        .reset-wrap.show{display:block;}

        footer{padding:20px 48px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
        footer p{font-size:12px;color:var(--muted);}
        footer a{color:var(--muted);text-decoration:none;font-size:12px;}
        footer a:hover{color:#fff;}
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">
        <div class="logo-ring"><div class="logo-dot"></div></div>
        OglasIQ
    </a>
    <div class="nav-right">Nimaš računa? <a href="registracija.html">Registracija</a></div>
</nav>

<div class="main">
    <div class="card">

        <!-- PRIJAVA -->
        <div id="login-form">
            <div class="card-title">Dobrodošel nazaj 👋</div>
            <div class="card-sub">Prijavi se v svoj OglasIQ račun.</div>

            <div class="error-msg" id="error-login"></div>
            <div class="success-msg" id="success-login"></div>

            <div class="form-group">
                <label class="form-label">Email naslov</label>
                <input class="form-input" type="email" placeholder="janez@gmail.com" id="email" onkeydown="if(event.key==='Enter')prijava()">
            </div>

            <div class="form-group">
                <label class="form-label">
                    Geslo
                    <a href="#" onclick="pokaziReset()">Pozabljeno geslo?</a>
                </label>
                <div class="password-wrap">
                    <input class="form-input" type="password" placeholder="Tvoje geslo" id="geslo" onkeydown="if(event.key==='Enter')prijava()">
                    <button class="password-toggle" onclick="togglePassword()">👁</button>
                </div>
            </div>

            <div class="remember-row">
                <label class="remember-check">
                    <input type="checkbox" id="remember" checked>
                    <span>Zapomni si me</span>
                </label>
            </div>

            <button class="btn-submit" id="btn-prijava" onclick="prijava()">Prijava →</button>

            <div class="divider"><div class="divider-line"></div><span>ali</span><div class="divider-line"></div></div>

            <button class="social-btn" onclick="alert('Google prijava bo dodana kmalu!')">
                <svg width="18" height="18" viewBox="0 0 24 24">
                    <path fill="#4285f4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34a853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#fbbc05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#ea4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Prijava z Google
            </button>

            <div class="register-link">Nimaš računa? <a href="registracija.html">Registriraj se brezplačno</a></div>
        </div>

        <!-- RESET GESLA -->
        <div class="reset-wrap" id="reset-form">
            <button class="btn-submit" style="background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;margin-bottom:16px;text-align:left;padding:0;width:auto;" onclick="skrijiReset()">← Nazaj</button>
            <div class="card-title">Ponastavi geslo</div>
            <div class="card-sub">Vpiši svoj email in poslali ti bomo povezavo za ponastavitev gesla.</div>
            <div class="error-msg" id="error-reset"></div>
            <div class="success-msg" id="success-reset"></div>
            <div class="form-group">
                <label class="form-label">Email naslov</label>
                <input class="form-input" type="email" placeholder="janez@gmail.com" id="reset-email">
            </div>
            <button class="btn-submit" id="btn-reset" onclick="posljiReset()">Pošlji navodila →</button>
        </div>

    </div>
</div>

<footer>
    <p>© 2026 OglasIQ</p>
    <div style="display:flex;gap:20px;">
        <a href="#">Pogoji uporabe</a>
        <a href="#">Zasebnost</a>
        <a href="#">Pomoč</a>
    </div>
</footer>

<script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://mzcygmkvqqmsoufptinm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16Y3lnbWt2cXFtc291ZnB0aW5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTY2MDMsImV4cCI6MjA5MjI3MjYwM30.u0UWS-URLgUu9zifPR197S-tRCpGJAIf-9XYJlHCLbA';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Preveri če je user že prijavljen
window.addEventListener('load', async () => {
    const { data: { session } } = await sb.auth.getSession();
    if(session) window.location.href = 'dashboard.html';
});

async function prijava() {
    const email = document.getElementById('email').value.trim();
    const geslo = document.getElementById('geslo').value;
    const error = document.getElementById('error-login');
    const btn = document.getElementById('btn-prijava');

    if(!email || !geslo) {
        error.textContent = 'Prosim vnesi email in geslo.';
        error.classList.add('show');
        return;
    }
    error.classList.remove('show');

    btn.disabled = true;
    btn.innerHTML = '<span class="loading-spinner"></span>Prijavljam...';

    try {
        const { data, error: authError } = await sb.auth.signInWithPassword({
            email: email,
            password: geslo
        });

        if(authError) {
            let msg = 'Napačen email ali geslo.';
            if(authError.message.includes('Invalid login')) msg = 'Napačen email ali geslo.';
            if(authError.message.includes('Email not confirmed')) msg = 'Email ni potrjen. Preveri svojo pošto.';
            if(authError.message.includes('Too many requests')) msg = 'Preveč poskusov. Počakaj minuto.';
            error.textContent = msg;
            error.classList.add('show');
            btn.disabled = false;
            btn.innerHTML = 'Prijava →';
            return;
        }

        // Shrani podatke v localStorage za dashboard
        if(data.user) {
            localStorage.setItem('oglasiq_user_id', data.user.id);
            localStorage.setItem('oglasiq_user_email', data.user.email);
            
            // Potegni paket iz baze
            const { data: uporabnik } = await sb.from('uporabniki')
                .select('paket, ime, priimek, notif')
                .eq('id', data.user.id)
                .single();
            
            if(uporabnik) {
                localStorage.setItem('oglasiq_paket', uporabnik.paket || 'free');
                localStorage.setItem('oglasiq_ime', uporabnik.ime || '');
                localStorage.setItem('oglasiq_priimek', uporabnik.priimek || '');
            }
        }

        // Preusmeri na dashboard
        window.location.href = 'dashboard.html';

    } catch(e) {
        error.textContent = 'Napaka: ' + e.message;
        error.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = 'Prijava →';
    }
}

async function posljiReset() {
    const email = document.getElementById('reset-email').value.trim();
    const error = document.getElementById('error-reset');
    const success = document.getElementById('success-reset');
    const btn = document.getElementById('btn-reset');

    if(!email) {
        error.textContent = 'Vnesi email naslov.';
        error.classList.add('show');
        return;
    }
    error.classList.remove('show');

    btn.disabled = true;
    btn.innerHTML = '<span class="loading-spinner"></span>Pošiljam...';

    const { error: resetError } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://oglasiq.github.io/oglasiq/prijava.html'
    });

    if(resetError) {
        error.textContent = 'Napaka pri pošiljanju.';
        error.classList.add('show');
    } else {
        success.textContent = '✅ Email poslan! Preveri svojo pošto.';
        success.classList.add('show');
    }

    btn.disabled = false;
    btn.innerHTML = 'Pošlji navodila →';
}

function pokaziReset() {
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('reset-form').classList.add('show');
}

function skrijiReset() {
    document.getElementById('reset-form').classList.remove('show');
    document.getElementById('login-form').style.display = 'block';
}

function togglePassword() {
    const input = document.getElementById('geslo');
    input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
